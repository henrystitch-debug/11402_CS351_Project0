name: Build and Test – Two Sum

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GCC, CMake and Ninja
        run: sudo apt-get install -y gcc cmake ninja-build

      - name: Configure with CMake
        run: cmake -B build -G Ninja

      - name: Build main program
        run: ninja -C build two_sum

      - name: Run test suite
        run: |
          ninja -C build test_two_sum
          ./build/test_two_sum